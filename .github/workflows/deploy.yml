name: CI/CD Guard Pipeline & Cloudflare Pages Deploy

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  quality_gate_and_deploy:
    name: Quality Audit & Deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies & Build React App
        run: |
          cd app-v2
          npm install
          npm run build

      - name: 🚦 2. Speed & SEO Guard (Lighthouse Audit)
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:8080/
          uploadArtifacts: true
          temporaryServerCommand: npx http-server ./app-v2/dist -p 8080
          budgetPath: ''

      - name: 🚀 3. Cloudflare Pages Deployment (Production / Preview)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./app-v2/dist --project-name=la-inconclusa
