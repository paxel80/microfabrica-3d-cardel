name: Add Cloudflare Subdomain

on:
  workflow_dispatch:
    inputs:
      subdomain:
        description: 'Subdomain to add (e.g. graph.lainconclusa.com)'
        required: true

jobs:
  add_domain:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🚀 Add Custom Domain to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages domain add ${{ github.event.inputs.subdomain }} --project-name=la-inconclusa
